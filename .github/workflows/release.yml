name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write    # softprops/action-gh-release needs this to upload assets
  id-token: none     # no OIDC

env:
  CARGO_TERM_COLOR: always
  CROSS_PINNED_TAG: v0.2.5

jobs:
  build:
    # workflow_dispatch must target a tag, never an arbitrary branch.
    if: github.event_name == 'push' || github.ref_type == 'tag'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            slug:    linux-gnu-x86_64
            triple:  x86_64-unknown-linux-gnu
            builder: cargo
          - runner: ubuntu-latest
            slug:    linux-gnu-aarch64
            triple:  aarch64-unknown-linux-gnu
            builder: cross
          - runner: ubuntu-latest
            slug:    linux-musl-x86_64
            triple:  x86_64-unknown-linux-musl
            builder: cross
          - runner: ubuntu-latest
            slug:    linux-musl-aarch64
            triple:  aarch64-unknown-linux-musl
            builder: cross
          - runner: macos-latest
            slug:    macos-x86_64
            triple:  x86_64-apple-darwin
            builder: cargo
          - runner: macos-latest
            slug:    macos-aarch64
            triple:  aarch64-apple-darwin
            builder: cargo

    runs-on: ${{ matrix.runner }}
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5    # v4

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9    # master
        with:
          toolchain: stable
          targets: ${{ matrix.triple }}

      - name: Install cross (cross builder only)
        if: matrix.builder == 'cross'
        run: cargo install cross --git https://github.com/cross-rs/cross --tag ${{ env.CROSS_PINNED_TAG }} --locked

      - name: Audit skills exist
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          skills=(skills/ny-*/)
          if [ "${#skills[@]}" -eq 0 ]; then
            echo "::error::no skill dirs found under skills/ -- nothing to package"
            exit 1
          fi
          cli=0
          process=0
          for s in "${skills[@]}"; do
            s="${s%/}"
            name="${s#skills/ny-}"
            if [ ! -f "$s/SKILL.md" ]; then
              echo "::error::skill $s missing SKILL.md"
              exit 1
            fi
            if [ -f "crates/$name/Cargo.toml" ]; then
              cli=$((cli + 1))
            else
              # Process skill: no crate, no binary. Ship SKILL.md only (via
              # source tarball / plugin install). Skip packaging in this job.
              echo "process skill (no crate): $s"
              process=$((process + 1))
            fi
          done
          echo "packaging $cli CLI skill(s) and acknowledging $process process skill(s) for $SLUG"

      - name: Audit binary crates have skill dirs
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          failed=0
          for c in crates/*/; do
            c="${c%/}"
            name="${c#crates/}"
            # Skip lib-only crates (no [[bin]] section in Cargo.toml).
            if ! grep -q '^\[\[bin\]\]' "$c/Cargo.toml"; then
              continue
            fi
            if [ ! -f "skills/ny-$name/SKILL.md" ]; then
              echo "::error::binary crate $name has no matching skills/ny-$name/SKILL.md"
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Build (cargo)
        if: matrix.builder == 'cargo'
        run: cargo build --workspace --release --locked --target ${{ matrix.triple }}

      - name: Build (cross)
        if: matrix.builder == 'cross'
        run: cross build --workspace --release --locked --target ${{ matrix.triple }}

      - name: Package + checksum every skill
        shell: bash
        env:
          SLUG: ${{ matrix.slug }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          out="release-assets"
          mkdir -p "$out"
          if command -v sha256sum >/dev/null; then SHA=(sha256sum); else SHA=(shasum -a 256); fi
          shopt -s nullglob
          for skill_dir in skills/ny-*/; do
            skill_dir="${skill_dir%/}"
            name="${skill_dir#skills/ny-}"
            # Process skills (no matching crate) ship via the source tarball
            # and the plugin install path; no binary to package here.
            if [ ! -f "crates/$name/Cargo.toml" ]; then
              echo "skip (process skill, no crate): $skill_dir"
              continue
            fi
            tar -C "target/$TRIPLE/release" -czf "$out/$name-$tag-$SLUG.tar.gz" "$name"
            ( cd "$out" && "${SHA[@]}" "$name-$tag-$SLUG.tar.gz" > "$name-$tag-$SLUG.sha256" )
            echo "packaged $out/$name-$tag-$SLUG.tar.gz"
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65    # v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          make_latest: ${{ !contains(github.ref_name, '-') }}
          fail_on_unmatched_files: true
